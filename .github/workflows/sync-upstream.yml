name: Sync Upstream

permissions:
  contents: write
  actions: write

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Configure Git
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"

      - name: Add Upstream Remote
        run: git remote add upstream https://github.com/monero-project/monero.git

      - name: Fetch Upstream
        run: git fetch upstream

      - name: Merge Upstream Master
        run: |
          # Merge upstream changes, favoring local changes for conflicts (keeps our Dockerfile)
          # Using "|| true" to handle specific conflict scenarios manually
          git merge upstream/master --no-edit -X ours || true

          # Resolve specific conflicts
          
          # 1. Dockerfile: Ensure we keep our version
          if git diff --name-only --diff-filter=U | grep -q "Dockerfile"; then
             echo "Resolving Dockerfile conflict by keeping ours..."
             git checkout --ours Dockerfile
             git add Dockerfile
          fi

          # 2. Workflows: Ensure unwanted upstream workflows are deleted
          for workflow in build.yml guix.yml depends.yml gitian.yml; do
             if git diff --name-only --diff-filter=U | grep -q ".github/workflows/$workflow"; then
                echo "Resolving conflict for $workflow by removing it..."
                git rm .github/workflows/$workflow
             fi
          done
          
          # Commit the merge if it was interrupted by conflicts
          if [ -f .git/MERGE_HEAD ]; then
             git commit -m "Merge upstream with custom resolutions [skip ci]"
          fi

      - name: Remove Upstream Workflows (Cleanup)
        run: |
          # Double check and remove if they sneaked in without conflict
          git rm --ignore-unmatch .github/workflows/build.yml .github/workflows/guix.yml .github/workflows/depends.yml .github/workflows/gitian.yml || true
          
          # Commit removal if needed
          if ! git diff --quiet --cached; then
            git commit -m "Remove upstream workflows [skip ci]"
          fi

      - name: Push Changes
        run: git push origin master

      - name: Sync Tags and Trigger Builds
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Capture existing tags on origin before push
          existing_tags=$(git ls-remote --tags origin | grep -oP 'refs/tags/v[\d.]+$' | sed 's|refs/tags/||' || true)

          # Fetch all upstream tags
          git fetch upstream --tags

          # Push all tags to origin
          git push origin --tags

          # Find new v* tags and trigger build + release workflows
          for tag in $(git tag -l 'v*' --sort=-v:refname); do
            if ! echo "$existing_tags" | grep -qx "$tag"; then
              echo "New tag detected: $tag — triggering workflows"
              gh workflow run build-docker.yaml -f tag_name="$tag" || echo "Failed to trigger build-docker for $tag"
              gh workflow run create-release.yml -f tag_name="$tag" || echo "Failed to trigger create-release for $tag"
            fi
          done
