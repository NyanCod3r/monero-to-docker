name: Sync Upstream

permissions:
  contents: write
  actions: write

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Configure Git
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"

      - name: Configure Upstream Remote
        run: |
          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream https://github.com/monero-project/monero.git
          else
            git remote add upstream https://github.com/monero-project/monero.git
          fi

      - name: Fetch Upstream
        run: git fetch upstream

      - name: Merge Upstream Master
        run: |
          git merge upstream/master --no-edit -X ours || true

          # 1. Dockerfile: keep ours
          if git diff --name-only --diff-filter=U | grep -q "^Dockerfile$"; then
            echo "Resolving Dockerfile conflict: keeping ours"
            git checkout --ours Dockerfile
            git add Dockerfile
          fi

          # 2. Unwanted upstream workflows: remove them
          for workflow in build.yml guix.yml depends.yml gitian.yml; do
            if git diff --name-only --diff-filter=U | grep -q "\.github/workflows/${workflow}$"; then
              echo "Resolving conflict for ${workflow}: removing"
              git rm -f ".github/workflows/${workflow}"
            fi
          done

          # 3. Catch-all for any remaining unmerged files:
          #    Capture list first to avoid index.lock conflicts during loop
          unmerged_files=$(git diff --name-only --diff-filter=U)
          for unmerged in $unmerged_files; do
            if [ -f "$unmerged" ]; then
              echo "Resolving unmerged file (keeping ours): $unmerged"
              git add "$unmerged"
            else
              echo "Resolving unmerged file (accepting upstream deletion): $unmerged"
              git rm -f "$unmerged" 2>/dev/null || true
            fi
          done

          # Commit the merge if still in progress
          if [ -f .git/MERGE_HEAD ]; then
            git commit -m "Merge upstream with custom resolutions [skip ci]"
          fi

      - name: Remove Upstream Workflows (Cleanup)
        run: |
          # Double check and remove if they sneaked in without conflict
          git rm --ignore-unmatch .github/workflows/build.yml .github/workflows/guix.yml .github/workflows/depends.yml .github/workflows/gitian.yml || true
          
          # Commit removal if needed
          if ! git diff --quiet --cached; then
            git commit -m "Remove upstream workflows [skip ci]"
          fi

      - name: Push Changes
        run: git push origin master

      - name: Sync Tags and Trigger Builds
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Fetch all upstream tags and push to origin
          git fetch upstream --tags
          git push origin --tags

          # Get tags that already have a GitHub release (these are fully done)
          released_tags=$(gh api repos/${{ github.repository }}/releases --paginate --jq '.[].tag_name' 2>/dev/null || true)

          # For every v* tag on origin, trigger build + release if no release exists yet
          for tag in $(git tag -l 'v*' --sort=v:refname); do
            if ! echo "$released_tags" | grep -qx "$tag"; then
              echo "No release found for $tag — triggering workflows"
              gh workflow run build-docker.yaml -f tag_name="$tag" --repo ${{ github.repository }} || echo "Failed to trigger build-docker for $tag"
              gh workflow run create-release.yml -f tag_name="$tag" --repo ${{ github.repository }} || echo "Failed to trigger create-release for $tag"
            fi
          done
